<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Get a Wriggle On!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080718;
      --surface: #110f28;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.18);
      --text: #ddd8ff;
      --text-muted: rgba(200,195,255,0.45);
      --font-display: 'Boogaloo', system-ui, sans-serif;
      --font: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(251,113,133,0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 85%, rgba(6,182,212,0.06) 0%, transparent 50%);
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 8%  12%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px   1px   at 23% 35%, rgba(255,255,255,0.4)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 41% 8%,  rgba(255,255,255,0.5)  0%, transparent 100%),
        radial-gradient(1px   1px   at 63% 22%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 78% 6%,  rgba(255,255,255,0.5)  0%, transparent 100%),
        radial-gradient(1px   1px   at 92% 18%, rgba(255,255,255,0.4)  0%, transparent 100%),
        radial-gradient(1px   1px   at 5%  55%, rgba(255,255,255,0.3)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 32% 68%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px   1px   at 71% 75%, rgba(255,255,255,0.4)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 88% 60%, rgba(255,255,255,0.5)  0%, transparent 100%),
        radial-gradient(1px   1px   at 17% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px   1px   at 46% 92%, rgba(255,255,255,0.3)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 95% 88%, rgba(255,255,255,0.45) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .hub {
      position: relative; z-index: 1;
      text-align: center;
      padding: 32px 20px;
      width: 100%; max-width: 480px;
    }

    .hub-title {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .hub-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 42px;
      font-weight: 500;
    }

    .kid-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kid-card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px 28px;
      display: flex; align-items: center; gap: 18px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s;
    }
    .kid-card:hover {
      transform: translateY(-3px);
      border-color: var(--k-border);
      box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 50px var(--k-glow);
    }
    .kid-card:active { transform: scale(0.97); }

    .kid-card[data-kid="ava"] {
      --k-border: rgba(34,211,238,0.4);
      --k-glow: rgba(34,211,238,0.12);
      --k-grad: linear-gradient(135deg, #0e7490, #4f46e5);
    }
    .kid-card[data-kid="george"] {
      --k-border: rgba(251,113,133,0.4);
      --k-glow: rgba(251,113,133,0.12);
      --k-grad: linear-gradient(135deg, #be123c, #ea580c);
    }

    .card-avatar {
      width: 62px; height: 62px; border-radius: 50%;
      background: var(--k-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }
    .card-text { text-align: left; }
    .card-name {
      font-family: var(--font-display);
      font-size: 1.6rem; color: var(--text);
      line-height: 1;
      margin-bottom: 3px;
    }
    .card-label {
      font-size: 0.82rem; color: var(--text-muted); font-weight: 500;
    }
    .card-arrow {
      margin-left: auto;
      font-size: 1.4rem; color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.18s, color 0.18s;
    }
    .kid-card:hover .card-arrow { transform: translateX(4px); color: var(--text); }
  </style>
</head>
<body>
  <div class="hub">
    <h1 class="hub-title">🚀 Get a Wriggle On!</h1>
    <p class="hub-sub">Whose morning mission are we on?</p>

    <div class="kid-cards">
      <a class="kid-card" data-kid="ava" href="./ava/">
        <div class="card-avatar">🦊</div>
        <div class="card-text">
          <div class="card-name">Ava</div>
          <div class="card-label">Morning mission board</div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="kid-card" data-kid="george" href="./george/">
        <div class="card-avatar">🦁</div>
        <div class="card-text">
          <div class="card-name">George</div>
          <div class="card-label">Morning mission board</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
