<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Get a Wriggle On!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080718;
      --surface: #110f28;
      --surface-2: #1a1740;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.18);
      --text: #ddd8ff;
      --text-muted: rgba(200,195,255,0.45);
      --done-bg: rgba(16,185,129,0.08);
      --done-border: rgba(16,185,129,0.25);
      --done-text: #34d399;
      --red: #fb7185;
      --gold: #f59e0b;
      --gold-bg: rgba(245,158,11,0.1);
      --gold-border: rgba(245,158,11,0.25);
      --radius: 20px;
      --shadow: 0 12px 40px rgba(0,0,0,0.55);
      --font-display: 'Boogaloo', system-ui, sans-serif;
      --font: 'DM Sans', system-ui, sans-serif;
    }

    /* ── Kid colour themes ────────────────────────── */
    .swimlane[data-kid="0"] {
      --k-color:  #22d3ee;
      --k-mid:    #818cf8;
      --k-light:  rgba(34,211,238,0.08);
      --k-glow:   rgba(34,211,238,0.18);
      --k-glow-s: rgba(34,211,238,0.08);
      --k-grad:   linear-gradient(135deg, #0e7490 0%, #4f46e5 100%);
      --k-border: rgba(34,211,238,0.3);
    }
    .swimlane[data-kid="1"] {
      --k-color:  #fb7185;
      --k-mid:    #fb923c;
      --k-light:  rgba(251,113,133,0.08);
      --k-glow:   rgba(251,113,133,0.18);
      --k-glow-s: rgba(251,113,133,0.08);
      --k-grad:   linear-gradient(135deg, #be123c 0%, #ea580c 100%);
      --k-border: rgba(251,113,133,0.3);
    }

    /* ── Base ─────────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 40%, rgba(99,102,241,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(6,182,212,0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 90%, rgba(236,72,153,0.07) 0%, transparent 50%);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Subtle star field */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 8% 12%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 23% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 41% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 63% 22%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 78% 6%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 32% 68%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 48%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 71% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 88% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 17% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 46% 92%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 95% 88%, rgba(255,255,255,0.45) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    /* ── App header ───────────────────────────────── */
    .app-header {
      position: relative; z-index: 1;
      text-align: center;
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
    }
    .app-header h1 {
      font-family: var(--font-display);
      font-size: 2.1rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .app-header .date {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ── Swimlanes wrapper ───────────────────────── */
    .swimlanes {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 18px 16px;
      max-width: 1040px;
      margin: 0 auto;
    }

    /* ── Swimlane ────────────────────────────────── */
    .swimlane {
      background: var(--surface);
      border: 1px solid var(--k-border, var(--border));
      border-radius: var(--radius);
      box-shadow: var(--shadow), 0 0 60px var(--k-glow-s, transparent);
      overflow: hidden;
    }

    /* ── Kid header ──────────────────────────────── */
    .kid-header {
      background: var(--k-grad);
      padding: 15px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      position: relative;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .btn-avatar {
      background: rgba(0,0,0,0.25);
      border: 2.5px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      width: 54px; height: 54px;
      font-size: 1.7rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn-avatar:active { transform: scale(0.88); }
    .btn-avatar.open { background: rgba(0,0,0,0.4); }

    /* Avatar picker */
    .avatar-picker {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: #1e1c42;
      border: 1px solid var(--border-bright);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      padding: 12px;
      z-index: 200;
      flex-wrap: wrap;
      gap: 6px;
      width: 238px;
    }
    .avatar-picker.open { display: flex; }

    .avatar-opt {
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 10px;
      font-size: 1.4rem;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s, transform 0.1s, background 0.12s;
    }
    .avatar-opt:active { transform: scale(0.85); }
    .avatar-opt.selected {
      border-color: var(--k-color, #22d3ee);
      background: var(--k-light, rgba(34,211,238,0.1));
    }

    /* Kid name */
    .kid-name-wrap { flex: 1; min-width: 0; }

    .kid-name-display {
      font-family: var(--font-display);
      font-size: 1.45rem;
      color: white;
      cursor: text;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s;
      max-width: 100%;
    }
    .kid-name-display:hover { border-bottom-color: rgba(255,255,255,0.45); }
    .edit-hint { font-size: 0.8rem; opacity: 0.6; font-family: var(--font); }

    .kid-name-input {
      font-family: var(--font-display);
      font-size: 1.45rem;
      color: #1e293b;
      background: white;
      border: none;
      border-radius: 8px;
      padding: 2px 10px;
      outline: none;
      width: 170px;
      max-width: 100%;
      display: none;
    }

    /* Progress */
    .kid-progress { margin-left: auto; text-align: right; flex-shrink: 0; }
    .kid-progress-bar-wrap {
      width: 90px;
      background: rgba(0,0,0,0.25);
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .kid-progress-bar-fill {
      height: 100%;
      background: white;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .kid-progress-label {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }

    /* ── Earnings strip ──────────────────────────── */
    .earnings-strip {
      background: var(--gold-bg);
      border-bottom: 1px solid var(--gold-border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .earnings-label {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .earnings-days {
      display: flex;
      gap: 7px;
      flex: 1;
      justify-content: center;
    }

    .day-dot {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 1px;
      transition: all 0.25s ease;
    }
    .day-dot .day-letter {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .day-dot .day-coin {
      font-size: 1.1rem;
      line-height: 1;
    }
    .day-dot.earned {
      background: rgba(245,158,11,0.18);
      border-color: rgba(245,158,11,0.55);
      box-shadow: 0 0 12px rgba(245,158,11,0.2);
    }
    .day-dot.earned .day-letter { color: rgba(245,158,11,0.7); }
    .day-dot.is-today {
      border-color: rgba(255,255,255,0.3);
    }
    .day-dot.is-today .day-letter { color: var(--text); }
    .day-dot.is-future {
      opacity: 0.4;
    }

    .earnings-total {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .earnings-history {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 16px 10px;
      background: var(--gold-bg);
      border-bottom: 1px solid var(--gold-border);
    }
    .history-badge {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .history-badge span { color: var(--gold); }

    /* ── Inner board ─────────────────────────────── */
    .inner-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 520px) {
      .inner-board { grid-template-columns: 1fr; }
    }

    .column {
      display: flex;
      flex-direction: column;
      min-height: 200px;
      border-right: 1px solid var(--border);
    }
    .column:last-child { border-right: none; }
    .column.done-col { background: rgba(16,185,129,0.025); }

    .column-header {
      padding: 11px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .todo-col .column-header { color: var(--k-color); }
    .done-col .column-header { color: #34d399; }

    .col-count {
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      padding: 1px 9px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: auto;
      color: var(--text-muted);
    }
    .todo-col .col-count { background: var(--k-light); color: var(--k-color); }
    .done-col .col-count { background: rgba(52,211,153,0.12); color: #34d399; }

    /* ── Task cards ──────────────────────────────── */
    .task-list {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
    }

    .task-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px 11px 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      user-select: none; -webkit-user-select: none;
    }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      border-color: var(--border-bright);
    }
    .task-card:active { transform: scale(0.97); }
    .task-card.done {
      background: var(--done-bg);
      border-color: var(--done-border);
    }
    .task-card.done .task-label {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .check-circle {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.85rem;
      color: white;
    }
    .task-card.done .check-circle {
      background: #10b981;
      border-color: #10b981;
    }

    .task-emoji { font-size: 1.25rem; flex-shrink: 0; }
    .task-label {
      font-size: 0.93rem;
      font-weight: 600;
      flex: 1;
      color: var(--text);
    }

    .btn-delete {
      background: none; border: none;
      color: var(--text-muted);
      font-size: 0.95rem; cursor: pointer;
      padding: 4px 6px;
      border-radius: 7px;
      transition: color 0.15s, background 0.15s;
      line-height: 1; flex-shrink: 0;
    }
    .btn-delete:hover { color: var(--red); background: rgba(251,113,133,0.1); }

    @keyframes popIn {
      0%   { transform: scale(0.55); opacity: 0; }
      70%  { transform: scale(1.07); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .task-card.pop { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── Add task form ───────────────────────────── */
    .add-task-wrap { padding: 0 10px 10px; }
    .task-emoji-row {
      display: flex; gap: 5px; flex-wrap: wrap;
      margin-bottom: 7px;
    }
    .task-emoji-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid transparent;
      border-radius: 8px;
      font-size: 1.15rem;
      width: 37px; height: 37px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s, transform 0.1s, background 0.12s;
    }
    .task-emoji-btn.selected {
      border-color: var(--k-color, #22d3ee);
      background: var(--k-light, rgba(34,211,238,0.08));
    }
    .task-emoji-btn:active { transform: scale(0.85); }

    .add-task-row { display: flex; gap: 7px; }
    .add-task-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .add-task-input::placeholder { color: var(--text-muted); }
    .add-task-input:focus {
      border-color: var(--k-color, #22d3ee);
      background: rgba(255,255,255,0.07);
    }

    .btn-add {
      background: var(--k-color, #22d3ee);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 9px 17px;
      font-size: 1.3rem;
      cursor: pointer;
      font-weight: 700;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-add:active { transform: scale(0.88); }
    .btn-add:hover { opacity: 0.85; }

    /* ── Confetti ─────────────────────────────────── */
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1000;
    }

    /* ── All-done banner ──────────────────────────── */
    .all-done-banner {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 900; align-items: center; justify-content: center;
    }
    .all-done-banner.show { display: flex; }
    .all-done-card {
      background: #1a1740;
      border: 1px solid var(--border-bright);
      border-radius: 28px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 80px rgba(99,102,241,0.15);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      max-width: 380px; width: 90%;
    }
    .all-done-card .banner-avatar { font-size: 3.8rem; margin-bottom: 10px; }
    .all-done-card h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: #34d399;
      margin-bottom: 8px;
    }
    .all-done-card .banner-main-msg {
      font-size: 0.97rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .banner-earned-msg {
      display: none;
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 22px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gold);
    }
    .banner-earned-msg.show { display: block; }
    .btn-dismiss {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none;
      border-radius: 14px; padding: 14px 34px;
      font-family: var(--font-display);
      font-size: 1.15rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-dismiss:hover { opacity: 0.88; }
    .btn-dismiss:active { transform: scale(0.96); }

    /* ── Footer ───────────────────────────────────── */
    .reset-row {
      position: relative; z-index: 1;
      text-align: center;
      padding: 10px 16px 28px;
    }
    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 99px;
      padding: 7px 20px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--red); color: var(--red); }

    /* Backdrop */
    .picker-backdrop {
      display: none; position: fixed; inset: 0; z-index: 100;
    }
    .picker-backdrop.open { display: block; }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="picker-backdrop" id="pickerBackdrop" onclick="closeAllPickers()"></div>

<!-- All-done overlay -->
<div class="all-done-banner" id="allDoneBanner">
  <div class="all-done-card">
    <div class="banner-avatar" id="bannerAvatar">🎉</div>
    <h2 id="bannerName">Mission Complete!</h2>
    <p class="banner-main-msg" id="bannerMsg">Every task done — go be awesome today!</p>
    <div class="banner-earned-msg" id="bannerEarned">💷 +£1 earned today!</div>
    <button class="btn-dismiss" onclick="dismissBanner()">Woohoo! Let's go! 🚀</button>
  </div>
</div>

<!-- App header -->
<header class="app-header">
  <h1>🚀 Get a Wriggle On!</h1>
  <p class="date" id="dateLabel"></p>
</header>

<!-- Swimlanes rendered by JS -->
<div class="swimlanes" id="swimlanes"></div>

<div class="reset-row">
  <button class="btn-reset" onclick="confirmReset()">Reset both boards for today</button>
</div>

<script>
// ── Constants ──────────────────────────────────────────
const STORAGE_KEY = 'get-a-wriggle-on-v1';

const AVATAR_EMOJIS = [
  '🦊','🦁','🐼','🐸','🦄','🐯','🐻','🐨','🐙','🦖',
  '🐲','🦋','🌟','🌈','🎃','🧸','🦅','🐬','🦔','🐺',
];

const TASK_EMOJIS = ['🦷','💇','🎒','💧','🍌','🧼','👟','🧴','📚','🥣','🧹','🧦','👕','🐕','🌿','⭐','💊'];

const DEFAULT_TASKS = [
  { label: 'Have breakfast',    emoji: '🥣' },
  { label: 'Brush teeth',       emoji: '🦷' },
  { label: 'Get dressed',       emoji: '👕' },
  { label: 'Do hair',           emoji: '💇' },
  { label: 'Get water bottle',  emoji: '💧' },
  { label: 'Pack your bag',     emoji: '🎒' },
  { label: 'Unload dishwasher', emoji: '🧹' },
  { label: 'Homework/reading',  emoji: '📚' },
  { label: 'Tidy room',         emoji: '🧦' },
  { label: 'Make bed',          emoji: '⭐' },
  { label: 'Tablet / vitamins', emoji: '💊' },
  { label: 'Wash face',         emoji: '🧼' },
];

const WEEKDAY_LABELS = ['M', 'T', 'W', 'T', 'F']; // Mon–Fri

// ── State ──────────────────────────────────────────────
let state = {
  date: todayStr(),
  kids: [
    { name: 'AB', avatar: '🦊', tasks: [], selectedTaskEmoji: TASK_EMOJIS[0], weekEarnings: null, earningsHistory: [] },
    { name: 'GB', avatar: '🦁', tasks: [], selectedTaskEmoji: TASK_EMOJIS[0], weekEarnings: null, earningsHistory: [] },
  ],
};

// ── Date helpers ───────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString('en-GB', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

// Parse DD/MM/YYYY → Date
function parseDate(str) {
  const [d, m, y] = str.split('/').map(Number);
  return new Date(y, m - 1, d);
}

// Monday of the current week, as DD/MM/YYYY
function getMondayStr() {
  const d = new Date();
  const day = d.getDay(); // 0=Sun, 1=Mon, …
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString('en-GB', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function isWeekday() {
  const d = new Date().getDay();
  return d >= 1 && d <= 5;
}

// ── Weekly earnings helpers ────────────────────────────
function defaultWeekEarnings() {
  return { weekId: getMondayStr(), days: [], total: 0 };
}

// Archive old week, reset for new week if necessary
function checkWeeklyReset(kid) {
  if (!kid.weekEarnings) {
    kid.weekEarnings = defaultWeekEarnings();
    return;
  }
  if (!kid.earningsHistory) kid.earningsHistory = [];

  const currentWeekId = getMondayStr();
  if (kid.weekEarnings.weekId !== currentWeekId) {
    // New week — archive old if it had any earnings
    if (kid.weekEarnings.total > 0) {
      kid.earningsHistory.unshift({
        weekId: kid.weekEarnings.weekId,
        total: kid.weekEarnings.total,
      });
      // Keep only last 4 weeks of history
      kid.earningsHistory = kid.earningsHistory.slice(0, 4);
    }
    kid.weekEarnings = defaultWeekEarnings();
  }
}

// Award £1 for today if eligible. Returns true if awarded.
function awardEarning(ki) {
  if (!isWeekday()) return false;
  const kid = state.kids[ki];
  checkWeeklyReset(kid);
  const today = todayStr();
  if (kid.weekEarnings.days.includes(today)) return false; // already awarded today
  if (kid.weekEarnings.total >= 5) return false;           // week fully earned
  kid.weekEarnings.days.push(today);
  kid.weekEarnings.total += 1;
  save();
  return true;
}

// ── Persistence ────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.date !== todayStr()) {
        saved.kids.forEach(k => k.tasks.forEach(t => t.done = false));
        saved.date = todayStr();
      }
      state.date = saved.date;
      saved.kids.forEach((sk, i) => {
        if (state.kids[i]) {
          state.kids[i] = { ...state.kids[i], ...sk };
          // Migrate: ensure weekEarnings exists
          if (!state.kids[i].earningsHistory) state.kids[i].earningsHistory = [];
          checkWeeklyReset(state.kids[i]);
        }
      });
      return;
    }
  } catch {}
  // First visit — seed default tasks
  state.kids.forEach((kid, ki) => {
    kid.tasks = DEFAULT_TASKS.map((t, i) => ({
      id: Date.now() + ki * 1000 + i,
      label: t.label, emoji: t.emoji, done: false,
    }));
    kid.weekEarnings = defaultWeekEarnings();
    kid.earningsHistory = [];
  });
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: state.date,
    kids: state.kids,
  }));
}

// ── Rendering ──────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('swimlanes');
  state.kids.forEach((kid, ki) => {
    let lane = document.getElementById(`swimlane-${ki}`);
    if (!lane) {
      lane = buildSwimlane(ki);
      container.appendChild(lane);
    }
    updateSwimlane(ki);
  });
}

function buildSwimlane(ki) {
  const lane = document.createElement('div');
  lane.className = 'swimlane';
  lane.dataset.kid = ki;
  lane.id = `swimlane-${ki}`;

  lane.innerHTML = `
    <!-- Kid header -->
    <div class="kid-header">
      <div class="avatar-wrap" id="avatarWrap-${ki}">
        <button class="btn-avatar" id="btnAvatar-${ki}" onclick="toggleAvatarPicker(${ki}, event)">
          ${state.kids[ki].avatar}
        </button>
        <div class="avatar-picker" id="avatarPicker-${ki}"></div>
      </div>
      <div class="kid-name-wrap">
        <span class="kid-name-display" id="kidNameDisplay-${ki}" onclick="startEditName(${ki})">
          ${escHtml(state.kids[ki].name)}
          <span class="edit-hint">✏️</span>
        </span>
        <input class="kid-name-input" id="kidNameInput-${ki}"
               maxlength="20" autocomplete="off" autocorrect="off"
               onblur="saveName(${ki})" onkeydown="nameKeydown(event,${ki})" />
      </div>
      <div class="kid-progress">
        <div class="kid-progress-bar-wrap">
          <div class="kid-progress-bar-fill" id="progressFill-${ki}" style="width:0%"></div>
        </div>
        <div class="kid-progress-label" id="progressLabel-${ki}">0 / 0 done</div>
      </div>
    </div>

    <!-- Weekly earnings strip -->
    <div class="earnings-strip" id="earningsStrip-${ki}">
      <span class="earnings-label">💷 This week</span>
      <div class="earnings-days" id="earningsDays-${ki}"></div>
      <span class="earnings-total" id="earningsTotal-${ki}">£0 / £5</span>
    </div>
    <div class="earnings-history" id="earningsHistory-${ki}" style="display:none"></div>

    <!-- Kanban columns -->
    <div class="inner-board">
      <div class="column todo-col">
        <div class="column-header">
          <span>⚡ To Do</span>
          <span class="col-count" id="todoCount-${ki}">0</span>
        </div>
        <div class="task-list" id="todoList-${ki}"></div>
        <div class="add-task-wrap">
          <div class="task-emoji-row" id="taskEmojiRow-${ki}"></div>
          <div class="add-task-row">
            <input class="add-task-input" id="taskInput-${ki}"
                   placeholder="Add a task…" maxlength="60"
                   autocomplete="off" autocorrect="off" spellcheck="false"
                   onkeydown="taskInputKey(event,${ki})" />
            <button class="btn-add" onclick="addTask(${ki})">+</button>
          </div>
        </div>
      </div>
      <div class="column done-col">
        <div class="column-header">
          <span>✅ Done</span>
          <span class="col-count" id="doneCount-${ki}">0</span>
        </div>
        <div class="task-list" id="doneList-${ki}"></div>
      </div>
    </div>
  `;

  return lane;
}

function updateSwimlane(ki) {
  const kid = state.kids[ki];
  const todo  = kid.tasks.filter(t => !t.done);
  const done  = kid.tasks.filter(t => t.done);
  const total = kid.tasks.length;

  document.getElementById(`todoCount-${ki}`).textContent = todo.length;
  document.getElementById(`doneCount-${ki}`).textContent = done.length;

  const pct = total ? Math.round((done.length / total) * 100) : 0;
  document.getElementById(`progressFill-${ki}`).style.width = pct + '%';
  document.getElementById(`progressLabel-${ki}`).textContent = `${done.length} / ${total} done`;

  const todoList = document.getElementById(`todoList-${ki}`);
  const doneList = document.getElementById(`doneList-${ki}`);
  todoList.innerHTML = '';
  doneList.innerHTML = '';
  todo.forEach(t => todoList.appendChild(makeCard(t, ki)));
  done.forEach(t => doneList.appendChild(makeCard(t, ki)));

  renderTaskEmojiRow(ki);
  renderEarningsStrip(ki);

  const btn = document.getElementById(`btnAvatar-${ki}`);
  if (btn) btn.textContent = kid.avatar;

  const display = document.getElementById(`kidNameDisplay-${ki}`);
  const input   = document.getElementById(`kidNameInput-${ki}`);
  if (display && input && input.style.display !== 'block') {
    display.innerHTML = `${escHtml(kid.name)} <span class="edit-hint">✏️</span>`;
  }

  renderAvatarPicker(ki);
}

function renderEarningsStrip(ki) {
  const kid = state.kids[ki];
  if (!kid.weekEarnings) return;

  const todayDate  = todayStr();
  const todayJSDay = new Date().getDay(); // 0=Sun … 6=Sat
  const mondayDate = parseDate(getMondayStr());

  // Build the 5 weekday date strings (Mon–Fri)
  const weekDates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(mondayDate);
    d.setDate(mondayDate.getDate() + i);
    weekDates.push(d.toLocaleDateString('en-GB', { year: 'numeric', month: '2-digit', day: '2-digit' }));
  }

  // Render day dots
  const container = document.getElementById(`earningsDays-${ki}`);
  if (!container) return;
  container.innerHTML = '';

  weekDates.forEach((dateStr, i) => {
    const earned  = kid.weekEarnings.days.includes(dateStr);
    const isToday = dateStr === todayDate;
    // Day index 0=Mon … 4=Fri; JS day 0=Sun, so Mon=1
    const dayJSIndex = i + 1;
    const isFuture = dayJSIndex > todayJSDay && !isToday;

    const dot = document.createElement('div');
    let cls = 'day-dot';
    if (earned)   cls += ' earned';
    if (isToday && !earned) cls += ' is-today';
    if (isFuture) cls += ' is-future';
    dot.className = cls;
    dot.title = dateStr;

    if (earned) {
      dot.innerHTML = `<span class="day-coin">💷</span><span class="day-letter">${WEEKDAY_LABELS[i]}</span>`;
    } else {
      dot.innerHTML = `<span class="day-letter">${WEEKDAY_LABELS[i]}</span>`;
    }
    container.appendChild(dot);
  });

  // Total
  const totalEl = document.getElementById(`earningsTotal-${ki}`);
  if (totalEl) totalEl.textContent = `£${kid.weekEarnings.total} / £5`;

  // History
  const histEl = document.getElementById(`earningsHistory-${ki}`);
  if (histEl) {
    const history = kid.earningsHistory || [];
    if (history.length > 0) {
      histEl.style.display = 'flex';
      histEl.innerHTML = '<span style="font-size:0.7rem;color:var(--text-muted);font-weight:600;margin-right:4px;align-self:center">Prev weeks:</span>';
      history.forEach(h => {
        const badge = document.createElement('span');
        badge.className = 'history-badge';
        // Format the weekId (Monday date) as "13 Jun"
        const d = parseDate(h.weekId);
        const mon = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        badge.innerHTML = `w/c ${mon}: <span>£${h.total}</span>`;
        histEl.appendChild(badge);
      });
    } else {
      histEl.style.display = 'none';
    }
  }
}

function makeCard(task, ki) {
  const div = document.createElement('div');
  div.className = 'task-card' + (task.done ? ' done' : '');
  div.dataset.id = task.id;
  div.innerHTML = `
    <div class="check-circle">${task.done ? '✓' : ''}</div>
    <span class="task-emoji">${task.emoji || '⭐'}</span>
    <span class="task-label">${escHtml(task.label)}</span>
    <button class="btn-delete" onclick="deleteTask(${ki},${task.id},event)">✕</button>
  `;
  div.addEventListener('click', () => toggleTask(ki, task.id));
  return div;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Task actions ───────────────────────────────────────
function toggleTask(ki, id) {
  const kid  = state.kids[ki];
  const task = kid.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  save();
  updateSwimlane(ki);

  if (task.done) {
    launchConfetti(ki);
    if (kid.tasks.length > 0 && kid.tasks.every(t => t.done)) {
      setTimeout(() => showAllDone(ki), 650);
    }
  }
}

function deleteTask(ki, id, e) {
  e.stopPropagation();
  state.kids[ki].tasks = state.kids[ki].tasks.filter(t => t.id !== id);
  save();
  updateSwimlane(ki);
}

function addTask(ki) {
  const input = document.getElementById(`taskInput-${ki}`);
  const label = input.value.trim();
  if (!label) { input.focus(); return; }
  const task = {
    id: Date.now(), label,
    emoji: state.kids[ki].selectedTaskEmoji,
    done: false,
  };
  state.kids[ki].tasks.push(task);
  save();
  updateSwimlane(ki);
  input.value = '';
  input.focus();
  requestAnimationFrame(() => {
    const card = document.querySelector(`#swimlane-${ki} .task-card[data-id="${task.id}"]`);
    if (card) card.classList.add('pop');
  });
}

function taskInputKey(e, ki) {
  if (e.key === 'Enter') addTask(ki);
}

// ── Name editing ───────────────────────────────────────
function startEditName(ki) {
  const display = document.getElementById(`kidNameDisplay-${ki}`);
  const input   = document.getElementById(`kidNameInput-${ki}`);
  display.style.display = 'none';
  input.value = state.kids[ki].name;
  input.style.display = 'block';
  input.focus(); input.select();
}

function saveName(ki) {
  const display = document.getElementById(`kidNameDisplay-${ki}`);
  const input   = document.getElementById(`kidNameInput-${ki}`);
  const val = input.value.trim() || state.kids[ki].name;
  state.kids[ki].name = val;
  save();
  display.innerHTML = `${escHtml(val)} <span class="edit-hint">✏️</span>`;
  input.style.display = 'none';
  display.style.display = '';
}

function nameKeydown(e, ki) {
  if (e.key === 'Enter')  { e.preventDefault(); saveName(ki); }
  if (e.key === 'Escape') {
    document.getElementById(`kidNameInput-${ki}`).style.display  = 'none';
    document.getElementById(`kidNameDisplay-${ki}`).style.display = '';
  }
}

// ── Avatar picker ──────────────────────────────────────
function renderAvatarPicker(ki) {
  const picker = document.getElementById(`avatarPicker-${ki}`);
  if (!picker) return;
  picker.innerHTML = '';
  AVATAR_EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'avatar-opt' + (em === state.kids[ki].avatar ? ' selected' : '');
    btn.textContent = em;
    btn.onclick = (e) => { e.stopPropagation(); pickAvatar(ki, em); };
    picker.appendChild(btn);
  });
}

function toggleAvatarPicker(ki, e) {
  e.stopPropagation();
  const picker   = document.getElementById(`avatarPicker-${ki}`);
  const btn      = document.getElementById(`btnAvatar-${ki}`);
  const backdrop = document.getElementById('pickerBackdrop');
  const isOpen   = picker.classList.contains('open');
  closeAllPickers();
  if (!isOpen) {
    picker.classList.add('open');
    btn.classList.add('open');
    backdrop.classList.add('open');
  }
}

function pickAvatar(ki, em) {
  state.kids[ki].avatar = em;
  save();
  closeAllPickers();
  updateSwimlane(ki);
}

function closeAllPickers() {
  document.querySelectorAll('.avatar-picker').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.btn-avatar').forEach(b => b.classList.remove('open'));
  document.getElementById('pickerBackdrop').classList.remove('open');
}

// ── Task emoji row ─────────────────────────────────────
function renderTaskEmojiRow(ki) {
  const row = document.getElementById(`taskEmojiRow-${ki}`);
  if (!row) return;
  row.innerHTML = '';
  TASK_EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'task-emoji-btn' + (em === state.kids[ki].selectedTaskEmoji ? ' selected' : '');
    btn.textContent = em;
    btn.onclick = () => { state.kids[ki].selectedTaskEmoji = em; renderTaskEmojiRow(ki); };
    row.appendChild(btn);
  });
}

// ── Reset ──────────────────────────────────────────────
function confirmReset() {
  if (confirm('Reset all tasks for both kids?')) {
    state.kids.forEach(k => k.tasks.forEach(t => t.done = false));
    save();
    renderAll();
  }
}

// ── All-done banner ────────────────────────────────────
function showAllDone(ki) {
  const kid    = state.kids[ki];
  const earned = awardEarning(ki);

  document.getElementById('bannerAvatar').textContent = kid.avatar;
  document.getElementById('bannerName').textContent   = `${kid.name} — Mission Complete!`;
  document.getElementById('bannerMsg').textContent    = 'Every task done — go be awesome today!';

  const earnedEl = document.getElementById('bannerEarned');
  if (earned) {
    earnedEl.textContent = `💷 +£1 earned today! (£${kid.weekEarnings.total} / £5 this week)`;
    earnedEl.classList.add('show');
  } else {
    earnedEl.classList.remove('show');
  }

  document.getElementById('allDoneBanner').classList.add('show');
  bigConfetti(ki);
  updateSwimlane(ki); // refresh earnings strip
}

function dismissBanner() {
  document.getElementById('allDoneBanner').classList.remove('show');
}

// ── Date header ────────────────────────────────────────
function renderDate() {
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = new Date();
  document.getElementById('dateLabel').textContent =
    `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ── Confetti ───────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];
let rafId = null;

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const KID_COLORS = [
  ['#22d3ee','#818cf8','#f59e0b','#34d399','#06b6d4'],
  ['#fb7185','#fb923c','#ef4444','#34d399','#ec4899'],
];

function spawnParticles(count, x, y, spread, ki) {
  const colors = KID_COLORS[ki] || KID_COLORS[0];
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * spread;
    const speed = 4 + Math.random() * 9;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: 8 + Math.random() * 10, h: 4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.22,
      alpha: 1,
      gravity: 0.24 + Math.random() * 0.14,
    });
  }
}

function launchConfetti(ki) {
  const xPos = ki === 0 ? canvas.width * 0.3 : canvas.width * 0.7;
  spawnParticles(45, xPos, canvas.height * 0.45, 1.8, ki);
  if (!rafId) tickConfetti();
}

function bigConfetti(ki) {
  const xL = ki === 0 ? canvas.width * 0.15 : canvas.width * 0.5;
  const xR = ki === 0 ? canvas.width * 0.5  : canvas.width * 0.85;
  spawnParticles(120, xL, canvas.height * 0.3, 2, ki);
  spawnParticles(120, xR, canvas.height * 0.3, 2, ki);
  if (!rafId) tickConfetti();
}

function tickConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity; p.vx *= 0.99;
    p.rot += p.rotSpeed;
    if (p.y > canvas.height * 0.65) p.alpha -= 0.022;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  if (particles.length > 0) {
    rafId = requestAnimationFrame(tickConfetti);
  } else {
    rafId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ── Init ───────────────────────────────────────────────
load();
renderDate();
renderAll();

// Midnight auto-reset (checks every minute)
setInterval(() => {
  const today = todayStr();
  if (state.date !== today) {
    state.kids.forEach(k => {
      k.tasks.forEach(t => t.done = false);
      checkWeeklyReset(k); // handles Monday earnings reset
    });
    state.date = today;
    save();
    renderAll();
    renderDate();
  }
}, 60_000);
</script>
